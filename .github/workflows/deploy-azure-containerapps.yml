name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and deploy Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}
          acrName: ${{ vars.AZURE_ACR_NAME }}
          acrUsername: ${{ secrets.AZURE_ACR_USERNAME }}
          acrPassword: ${{ secrets.AZURE_ACR_PASSWORD }}
          containerAppName: ${{ vars.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          containerAppEnvironment: ${{ vars.AZURE_CONTAINER_APP_ENVIRONMENT }}
          imageToBuild: ${{ vars.AZURE_ACR_NAME }}.azurecr.io/churn-prediction-api:${{ github.sha }}
          targetPort: 8000
          ingress: external
          environmentVariables: >-
            MODEL_BUNDLE_PATH=/app/artifacts/model/model_bundle.joblib
            OPENAI_MODEL=text-embedding-3-small
            OPENAI_BASE_URL=${{ vars.OPENAI_BASE_URL }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          disableTelemetry: true
